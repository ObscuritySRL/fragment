name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  windows:
    # Build and test both bitnesses with MSVC. x86 reuses the shared i386 engine
    # backend (common/arch/i386), x64 the x86_64 backend.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_a: x64
          - arch: x86
            cmake_a: Win32
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure
        run: cmake -S windows -B windows/build -A ${{ matrix.cmake_a }}

      - name: Build Fragment.dll (Release)
        run: cmake --build windows/build --config Release

      - name: Build & run the hook-engine unit test
        shell: cmd
        run: |
          cl /nologo /O2 /MD /W3 windows\test\hooktest.c /Fe:windows\build\hooktest.exe /Fo:windows\build\hooktest.obj || exit /b 1
          windows\build\hooktest.exe || exit /b 1

      # Cross-bitness export resolver (PE32 only): the parser the 64-bit
      # fragment.exe runs over a WOW64 target's 32-bit kernel32 to find
      # LoadLibraryA, exercised here over the real kernel32 on the x86 leg.
      - name: Build & run the cross-bitness export-resolver test
        if: matrix.arch == 'x86'
        shell: cmd
        run: |
          cl /nologo /O2 /MD /W3 windows\test\pe32test.c /Fe:windows\build\pe32test.exe /Fo:windows\build\pe32test.obj || exit /b 1
          windows\build\pe32test.exe || exit /b 1

      - name: Build & run the mock-libcurl integration test
        shell: cmd
        run: |
          cl /nologo /O2 /MD /W3 /D_CRT_SECURE_NO_WARNINGS /LD windows\test\mockcurl.c /Fe:windows\build\mockcurl.dll /Fo:windows\build\mockcurl.obj || exit /b 1
          cl /nologo /O2 /MD /W3 /D_CRT_SECURE_NO_WARNINGS windows\test\host_mock.c    /Fe:windows\build\host_mock.exe /Fo:windows\build\host_mock.obj || exit /b 1
          windows\build\host_mock.exe windows\build\Release\Fragment.dll windows\build\mockcurl.dll || exit /b 1

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fragment-${{ matrix.arch }}
          path: windows/build/Release/Fragment.dll
          if-no-files-found: error

  windows-wow64:
    # Cross-bitness injection end to end on a real WOW64-capable runner: a
    # 64-bit fragment.exe injecting the 32-bit Fragment32.dll into a 32-bit
    # target. The loader resolves the target's OWN 32-bit kernel32 LoadLibraryA
    # (its own 64-bit one is the wrong image), and a passive 32-bit victim --
    # which never loads Fragment itself -- reports whether its mock-libcurl call
    # came back rewritten, so a PASS proves the injection took. A run of the same
    # victim with no injection is the non-vacuous negative control.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build the x64 loader (fragment.exe)
        shell: cmd
        run: |
          cmake -S windows -B windows/build64 -A x64 || exit /b 1
          cmake --build windows/build64 --config Release || exit /b 1

      - name: Set up MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
      - name: Build the 32-bit DLL + WOW64 fixtures
        shell: cmd
        run: |
          cmake -S windows -B windows/build32 -A Win32 || exit /b 1
          cmake --build windows/build32 --config Release || exit /b 1
          copy /y windows\build32\Release\Fragment.dll windows\build64\Release\Fragment32.dll || exit /b 1
          cl /nologo /O2 /MD /W3 /D_CRT_SECURE_NO_WARNINGS /LD windows\test\mockcurl.c /Fe:windows\build64\Release\mockcurl.dll /Fo:windows\build32\mockcurl.obj || exit /b 1
          cl /nologo /O2 /MD /W3 /D_CRT_SECURE_NO_WARNINGS    windows\test\victim.c   /Fe:windows\build64\Release\victim.exe  /Fo:windows\build32\victim.obj  || exit /b 1

      - name: Cross-bitness inject (64-bit fragment.exe -> 32-bit Fragment32.dll)
        shell: cmd
        working-directory: windows/build64/Release
        run: |
          dir Fragment32.dll fragment.exe victim.exe mockcurl.dll
          rem Non-vacuous negative control: an un-injected victim must NOT rewrite.
          victim.exe mockcurl.dll
          if %errorlevel% EQU 0 (echo NEG CONTROL FAILED: victim rewrote with no injection & exit /b 1)
          echo negative control OK ^(un-injected victim did not rewrite^)
          rem Launch + cross-bitness inject; victim exits 0 once a request is rewritten.
          fragment.exe -- victim.exe mockcurl.dll
          if %errorlevel% NEQ 0 (echo CROSS-BITNESS INJECT FAILED & exit /b 1)
          echo cross-bitness inject OK

  windows-arm64:
    # Windows on ARM: the aarch64 engine backend (common/arch/aarch64, shared
    # with linux-aarch64) under the Windows PE glue, built and tested natively on
    # a Windows-11-ARM runner.
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC (arm64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Configure
        run: cmake -S windows -B windows/build -A ARM64

      - name: Build Fragment.dll (Release)
        run: cmake --build windows/build --config Release

      - name: Build & run the hook-engine unit test
        shell: cmd
        run: |
          cl /nologo /O2 /MD /W3 windows\test\hooktest.c /Fe:windows\build\hooktest.exe /Fo:windows\build\hooktest.obj || exit /b 1
          windows\build\hooktest.exe || exit /b 1

      - name: Build & run the mock-libcurl integration test
        shell: cmd
        run: |
          cl /nologo /O2 /MD /W3 /D_CRT_SECURE_NO_WARNINGS /LD windows\test\mockcurl.c /Fe:windows\build\mockcurl.dll /Fo:windows\build\mockcurl.obj || exit /b 1
          cl /nologo /O2 /MD /W3 /D_CRT_SECURE_NO_WARNINGS windows\test\host_mock.c    /Fe:windows\build\host_mock.exe /Fo:windows\build\host_mock.obj || exit /b 1
          windows\build\host_mock.exe windows\build\Release\Fragment.dll windows\build\mockcurl.dll || exit /b 1

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fragment-arm64
          path: windows/build/Release/Fragment.dll
          if-no-files-found: error

  linux:
    # Build and test natively on both Linux architectures the port supports.
    strategy:
      fail-fast: false
      matrix:
        runner: [ ubuntu-latest, ubuntu-24.04-arm ]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Build libfragment.so (Release)
        working-directory: linux
        run: ./build.sh Release

      - name: Build & run the hook-engine unit test
        working-directory: linux
        run: |
          cc -O2 -std=c17 -mbranch-protection=standard test/hooktest.c -o build/hooktest -lpthread 2>/dev/null \
            || cc -O2 -std=c17 test/hooktest.c -o build/hooktest -lpthread
          ./build/hooktest

      - name: Build & run the mock + static-curl integration tests
        working-directory: linux
        run: |
          cc -O2 -std=c17 -fPIC -shared test/mockcurl.c -o build/libmockcurl.so
          cc -O2 -std=c17 test/host_mock.c -o build/host_mock -Lbuild -lmockcurl -Wl,-rpath,"$PWD/build"
          cc -O2 -std=c17 -no-pie test/host_mock.c test/mockcurl.c -o build/host_mock_static
          env -u FRAGMENT_PROXY LD_PRELOAD="$PWD/build/libfragment.so" ./build/host_mock
          env -u FRAGMENT_PROXY LD_PRELOAD="$PWD/build/libfragment.so" ./build/host_mock_static

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libfragment-${{ runner.arch }}
          path: linux/build/libfragment.so
          if-no-files-found: error

# NOTE: the full real-libcurl matrix (linux/test/run.py) drives the SYSTEM
# libcurl + curl binary and a live ptrace injection; the ptrace row needs
# kernel.yama.ptrace_scope=0 (or CAP_SYS_PTRACE), so the matrix is run locally
# rather than in CI. CI proves, on a clean machine: a build of each OS, the
# self-contained engine unit test (prologue relocation + fail-closed paths), AND
# the mock-libcurl interposition + static-curl inline-hook tests -- which
# exercise the real rewrite/idempotency/option-drop path against a genuine (mock)
# libcurl, with no third-party binaries.
